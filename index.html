/* ---------- FCM: notificaciones push nativas ---------- */
const VAPID_KEY = "BFPrLZ-XsfVf5L5UlrX9YJ9AvmIJ0CU1wvnhwNLlyGZYRXP_J5Y_1-5ZeLZJ442m10Vzrtpv3oidohc0zM0ObdM";
let messaging = null;
try { messaging = firebase.messaging(); } catch(e) { console.warn("FCM no soportado en este navegador:", e.message); }

async function initPushNotifications(userEmail){
  if (!messaging) return;
  try {
    const permission = await Notification.requestPermission();
    if (permission !== "granted"){ console.log("Permiso de notificaciones denegado"); return; }
    const token = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: await navigator.serviceWorker.ready });
    if (!token) return;
    // Guardar el token asociado al usuario en Firestore para poder enviarle notificaciones
    await tokensRef.doc(token).set({ email: userEmail, token, updatedAt: Date.now() });
    console.log("Token FCM registrado:", token.substring(0,20) + "...");
    // Manejar notificaciones cuando la app está abierta (en primer plano)
    messaging.onMessage(payload => {
      const { title, body } = payload.notification || {};
      if (Notification.permission === "granted"){
        new Notification(title || "Casa López", { body: body || "", icon: "/icon-192.png" });
      }
      // También actualizar el toast interno
      if (body){ state.toast = body; render(); setTimeout(()=>{ state.toast=null; render(); }, 4000); }
    });
  } catch(e){ console.error("Error iniciando FCM:", e); }
}

// Registrar el Service Worker al cargar la página
if ('serviceWorker' in navigator){
  navigator.serviceWorker.register('/firebase-messaging-sw.js')

}

// Función que usa el servidor (Cloud Function) para enviar push a todos los tokens del hogar.
// Como no tenemos Cloud Functions, usamos la API de FCM directamente desde el cliente
// enviando solo a los tokens guardados en Firestore (no requiere server key).
async function sendPushToAll(title, body){
  // Las notificaciones push a otros dispositivos requieren un servidor con la Server Key de FCM.
  // En esta versión, los dispositivos con la app abierta las reciben vía onMessage (arriba),
  // y los dispositivos con la app cerrada las recibirán cuando implementemos Cloud Functions.

  console.log("Push enviado (segundo plano):", title, body);
}

const CATEGORIES = {
  patio:      { label: "Patio",       color: "#7C9070", icon: "🌿" },
  cocina:     { label: "Cocina",      color: "#C86A4B", icon: "🍽️" },
  bano:       { label: "Baño",        color: "#3E7C7B", icon: "🛁" },
  comedor:    { label: "Comedor",     color: "#D9A441", icon: "🪑" },
  sala:       { label: "Sala",        color: "#5B7C99", icon: "🛋️" },
  mascotas:   { label: "Mascotas",    color: "#8B5E3C", icon: "🐶" },
  lavanderia: { label: "Lavandería",  color: "#8E7CC3", icon: "👕" },
  basura:     { label: "Basura",      color: "#6B6B6B", icon: "🗑️" },
  compras:    { label: "Compras",     color: "#B85C5C", icon: "🛒" },
  general:    { label: "General",     color: "#2B3B3A", icon: "✨" },
};

const DEFAULT_TASKS = [
  { title: "Limpiar el patio", category: "patio", recurring: "semanal" },
  { title: "Lavar los trastes", category: "cocina", recurring: "diario" },
  { title: "Dar de comer a los perros", category: "mascotas", recurring: "diario" },
  { title: "Bañar a los perros", category: "mascotas", recurring: "quincenal" },
  { title: "Limpiar la cocina", category: "cocina", recurring: "diario" },
  { title: "Limpiar el comedor", category: "comedor", recurring: "diario" },
  { title: "Limpiar la sala", category: "sala", recurring: "diario" },
  { title: "Limpiar el baño", category: "bano", recurring: "semanal" },
  { title: "Preparar y sacar la basura", category: "basura", recurring: "diario" },
  { title: "Regar las plantas", category: "patio", recurring: "diario" },
  { title: "Lavar ropa", category: "lavanderia", recurring: "semanal" },
  { title: "Doblar y guardar ropa", category: "lavanderia", recurring: "semanal" },
  { title: "Tender las camas", category: "general", recurring: "diario" },
  { title: "Barrer y trapear pisos", category: "general", recurring: "semanal" },
  { title: "Limpiar ventanas", category: "general", recurring: "quincenal" },
  { title: "Sacar la basura de reciclaje", category: "basura", recurring: "semanal" },
  { title: "Limpiar el refrigerador", category: "cocina", recurring: "quincenal" },
  { title: "Organizar garaje o bodega", category: "general", recurring: "quincenal" },
  { title: "Lavar el carro", category: "patio", recurring: "quincenal" },
  { title: "Cambiar sábanas", category: "general", recurring: "semanal" },
  { title: "Podar el jardín", category: "patio", recurring: "quincenal" },
  { title: "Comprar despensa", category: "compras", recurring: "semanal" },
];
const RECUR_DAYS = { diario: 1, semanal: 7, quincenal: 14 };
const ROTATION_EPOCH = new Date(2024, 0, 1).getTime(); // lunes de referencia
function weekIndex(){ return Math.floor((Date.now() - ROTATION_EPOCH) / (7*86400000)); }
function currentAssignee(slot){
  const wi = weekIndex();
  if (slot.override && slot.override.weekIndex === wi) return slot.override.email;
  if (!slot.rotation || slot.rotation.length === 0) return null;
  return slot.rotation[wi % slot.rotation.length];
}
function nextAssignee(slot){
  if (!slot.rotation || slot.rotation.length === 0) return null;
  return slot.rotation[(weekIndex()+1) % slot.rotation.length];
}
// Devuelve los próximos `count` turnos (email + en cuántas semanas), sin repetir el turno actual.
function upcomingAssignees(slot, count){
  if (!slot.rotation || slot.rotation.length === 0) return [];
  const wi = weekIndex();
  const out = [];
  const max = Math.min(count, slot.rotation.length - 1);
  for (let i = 1; i <= max; i++){
    out.push({ email: slot.rotation[(wi + i) % slot.rotation.length], weeksAhead: i });
  }
  return out;
}
// Convierte una tarea del formato antiguo (campos sueltos) al nuevo formato con slots[].
// Necesario porque ya hay datos reales guardados con el formato viejo.
function migrateTask(t){
  if (t.slots) return t;
  const { rotation, override, status, completedBy, completedAt, helpRequestedBy, points, pointsGivenAt, ...rest } = t;
  return {
    ...rest,
    slots: [{
      id: uid(), label: null,
      rotation: rotation || [], override: override || null,
      status: status || "pendiente", completedBy: completedBy || null, completedAt: completedAt || null,
      helpRequestedBy: helpRequestedBy || null, points: points || null, pointsGivenAt: pointsGivenAt || null,
    }],
  };
}
function slotEffStatus(slot, recurring){
  if (slot.status !== "completado") return slot.status;
  return daysSince(slot.completedAt) >= (RECUR_DAYS[recurring] || 1) ? "pendiente" : "completado";
}
const DAY_NAMES = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
function startOfWeek(){
  const d = new Date(); const dow = (d.getDay()+6)%7;
  d.setHours(0,0,0,0); d.setDate(d.getDate()-dow); return d;
}
function isTaskDueOn(task, dayIndex){
  if (task.recurring === "diario") return true;
  if (task.weekday === null || task.weekday === undefined) return false;
  if (task.recurring === "semanal") return task.weekday === dayIndex;
  if (task.recurring === "quincenal") return task.weekday === dayIndex && weekIndex()%2===0;
  return false;
}

/* ---------- helpers ---------- */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const daysSince = (d) => d ? (Date.now() - new Date(d).getTime()) / 86400000 : Infinity;
function timeAgo(ts){
  if (!ts) return "";
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return "hace un momento";
  if (s < 3600) return `hace ${Math.floor(s/60)} min`;
  if (s < 86400) return `hace ${Math.floor(s/3600)} h`;
  return `hace ${Math.floor(s/86400)} d`;
}
function formatTime(ts){
  if (!ts) return "";
  const d = new Date(ts);
  const isToday = d.toDateString() === new Date().toDateString();
  const hora = d.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
  return isToday ? `hoy ${hora}` : `${d.toLocaleDateString('es-MX',{day:'numeric',month:'short'})} ${hora}`;
}
function initials(name){ return (name||"?").trim().split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()).join(""); }
function colorFor(email){
  const p = ["#C86A4B","#7C9070","#3E7C7B","#D9A441","#5B7C99","#8B5E3C","#8E7CC3","#B85C5C"];
  let h=0; for(const c of email) h=(h*31+c.charCodeAt(0))%p.length; return p[h];
}
function esc(str){ return (str||"").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }

/* ---------- storage: sesión local (por dispositivo) + datos compartidos en Firestore ---------- */
function loadLocal(key, fallback){
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function saveLocal(key, val){ try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){ console.error(e); } }

// Bandera para evitar que nuestras propias escrituras disparen un "toast" de notificación duplicado.
let suppressNextSnapshotToast = false;
let firestoreReady = false;

// Escribe un campo (users/tasks/notifs/announcements) en el documento compartido del hogar.
function syncField(field, val){
  hogarRef.set({ [field]: val }, { merge: true }).catch(err => console.error("Error guardando en Firestore:", err));
}

/* ---------- app state ---------- */

    createdAt: Date.now(),
    slots: [{ id: uid(), label: null, rotation: [u[0].email], override: null, status: "pendiente",
      completedBy: null, completedAt: null, helpRequestedBy: null, points: null, pointsGivenAt: null }],
  }));
}

function boot(){
  const sess = loadLocal("hl-session", null);
  if (sess){ state.session = sess; initPushNotifications(sess.email); }

  // Escucha en tiempo real el documento compartido del hogar.
  // Cualquier cambio hecho desde CUALQUIER dispositivo llega aquí al instante.
  hogarRef.onSnapshot(async (doc) => {
    if (!doc.exists){
      // Primera vez: crear el documento con los datos por defecto.
      const u = defaultUsers();
      const t = defaultTasks(u);
      await hogarRef.set({ users: u, tasks: t, notifs: [], announcements: [], pointsLog: [] });
      return; // el propio set() disparará este mismo listener de nuevo con los datos ya creados
    }
    const data = doc.data();
    const newNotifs = data.notifs || [];

    // Detectar notificaciones nuevas (llegadas desde otro dispositivo) para mostrar el toast.
    if (firestoreReady && state.session && newNotifs.length > state.lastSeenCount){
      const fresh = newNotifs.slice(state.lastSeenCount);
      const relevant = fresh.filter(x => x.forEmail === "all" || x.forEmail === state.session.email);
      if (relevant.length){
        state.toast = relevant[relevant.length-1].message;
        setTimeout(()=>{ state.toast = null; render(); }, 4000);
      }
    }

    state.users = data.users || [];
    const rawTasks = data.tasks || [];
    const migratedTasks = rawTasks.map(migrateTask);
    state.tasks = migratedTasks;
    state.notifs = newNotifs;
    state.announcements = data.announcements || [];
    state.pointsLog = data.pointsLog || [];
    state.lastSeenCount = newNotifs.length;

    // Si alguna tarea estaba en formato viejo, guardamos ya migrada para no repetir esto cada vez.
    if (JSON.stringify(migratedTasks) !== JSON.stringify(rawTasks)){
      syncField("tasks", migratedTasks);
    }

    // Revalidar la sesión guardada localmente contra la lista real de usuarios.
    if (state.session && !state.users.some(x => x.email === state.session.email)){
      state.session = null; saveLocal("hl-session", null);
    }
    firestoreReady = true;
    render();
  }, (err) => {
    console.error("Error de sincronización con Firestore:", err);
  });

  render(); // pantalla de carga/login mientras llega el primer snapshot
}

function pushNotif(message, forEmail="all"){
  const updated = [...state.notifs, { id: uid(), message, ts: Date.now(), forEmail }].slice(-100);
  state.notifs = updated; state.lastSeenCount = updated.length;
  syncField("notifs", updated);
  // Mostrar notificación nativa del sistema (funciona aunque la app esté en segundo plano)
  if (Notification && Notification.permission === "granted"){
    try {
      navigator.serviceWorker.ready.then(reg => {
        reg.showNotification("Casa López 🏠", {
          body: message,
          icon: "/icon-192.png",
          badge: "/icon-192.png",
          tag: "casa-lopez-" + Date.now(),
          vibrate: [200, 100, 200],
        });
      });
    } catch(e){ console.warn("No se pudo mostrar notificación nativa:", e); }
  }
}

/* ---------- actions ---------- */
const App = {
  setForm(field, val){ state.form[field] = val; },
  togglePass(){
    state.showPass = !state.showPass;
    const input = document.getElementById('in-pass');
    const btn = document.getElementById('eye-btn');
    if (input) input.type = state.showPass ? 'text' : 'password';
    if (btn) btn.textContent = state.showPass ? '🙈' : '👁️';
  },
  goRegister(){ state.screen="register"; state.authErr=""; render(); },
  goLogin(){ state.screen="login"; state.authErr=""; render(); },

  login(e){
    e.preventDefault();
    const email = document.getElementById("in-email").value.trim().toLowerCase();
    const pass = document.getElementById("in-pass").value.trim();
    const u = state.users.find(x => x.email.toLowerCase() === email);
    if (!u || u.pass !== pass){ state.authErr = "Correo o clave incorrectos."; render(); return; }
    state.session = { email: u.email, name: u.name, role: u.role };
    saveLocal("hl-session", state.session);
    state.authErr = ""; render();
    initPushNotifications(u.email);
  },
  register(e){
    e.preventDefault();
    const name = document.getElementById("in-name").value.trim();
    const email = document.getElementById("in-email").value.trim().toLowerCase();
    const pass = document.getElementById("in-pass").value.trim();
    if (!email || !name || pass.length < 4){ state.authErr = "Completa nombre, correo y una clave de al menos 4 caracteres."; render(); return; }
    if (state.users.some(x => x.email.toLowerCase() === email)){ state.authErr = "Ese correo ya está registrado."; render(); return; }
    const newUser = { email, pass, name, role:"miembro", joinedAt: Date.now() };
    state.users = [...state.users, newUser]; syncField("users", state.users);
    state.tasks = state.tasks.map(t => ({...t, slots: t.slots.map(s =>
      s.rotation.includes(email) ? s : {...s, rotation: [...s.rotation, email]})}));
    syncField("tasks", state.tasks);
    pushNotif(`${newUser.name} se unió a la familia 🎉 y ya entra en los turnos de todas las tareas`, "all");
    state.session = { email, name, role:"miembro" }; saveLocal("hl-session", state.session);
    state.authErr=""; render();
    initPushNotifications(email);
  },
  logout(){ state.session=null; localStorage.removeItem("hl-session"); state.tab="tareas"; render(); },

  setTab(t){ state.tab = t; render(); },
  setFilter(c){ state.catFilter = c; render(); },

  mapSlot(taskId, slotId, fn){
    state.tasks = state.tasks.map(t => t.id!==taskId ? t : {...t, slots: t.slots.map(s => s.id!==slotId ? s : fn(s))});
    syncField("tasks", state.tasks);
  },
  complete(taskId, slotId){
    const task = state.tasks.find(t=>t.id===taskId);
    const slot = task.slots.find(s=>s.id===slotId);
    App.mapSlot(taskId, slotId, s => ({...s, status:"completado", completedBy: state.session.email, completedAt: Date.now(), helpRequestedBy: null}));
    const label = slot.label ? ` (${slot.label})` : "";
    pushNotif(`✅ ${state.session.name} completó "${task.title}${label}"`, "all");
    render();
  },
  requestHelp(taskId, slotId){
    const task = state.tasks.find(t=>t.id===taskId);
    const slot = task.slots.find(s=>s.id===slotId);
    App.mapSlot(taskId, slotId, s => ({...s, status:"ayuda", helpRequestedBy: state.session.email}));
    const label = slot.label ? ` (${slot.label})` : "";
    pushNotif(`🙋 ${state.session.name} pidió apoyo con "${task.title}${label}"`, "all");
    render();
  },
  takeOver(taskId, slotId){
    const task = state.tasks.find(t=>t.id===taskId);
    const slot = task.slots.find(s=>s.id===slotId);
    App.mapSlot(taskId, slotId, s => ({...s, status:"pendiente", override: { weekIndex: weekIndex(), email: state.session.email }, helpRequestedBy: null}));
    const label = slot.label ? ` (${slot.label})` : "";
    pushNotif(`🤝 ${state.session.name} tomó "${task.title}${label}" esta semana para ayudar`, "all");
    render();
  },
  overrideWeek(taskId, slotId, email){
    App.mapSlot(taskId, slotId, s => ({...s, override: email ? { weekIndex: weekIndex(), email } : null}));
    if (email){ const p = state.users.find(u=>u.email===email); pushNotif(`📌 Esta semana esa tarea la hace ${p?p.name:email}`, "all"); }
    render();
  },
  setPoints(taskId, slotId, points){
    const task = state.tasks.find(t=>t.id===taskId);
    const slot = task.slots.find(s=>s.id===slotId);
    App.mapSlot(taskId, slotId, s => ({...s, points, pointsGivenAt: s.completedAt}));
    const person = state.users.find(u=>u.email===slot.completedBy);
    const log = [...state.pointsLog, { id: uid(), taskId, slotId, taskTitle: task.title, email: slot.completedBy, points, ts: Date.now() }].slice(-1000);
    state.pointsLog = log; syncField("pointsLog", log);
    if (person) pushNotif(`🏆 ${state.session.name} le dio ${points} pt${points>1?'s':''} a ${person.name} por "${task.title}"`, "all");
    render();
  },
  openRotation(taskId, slotId){ state.rotationEditId = taskId; state.rotationEditSlotId = slotId; render(); },
  closeRotation(){ state.rotationEditId = null; state.rotationEditSlotId = null; render(); },
  setRotationSlot(slotId){ state.rotationEditSlotId = slotId; render(); },
  setWeekday(id, val){
    state.tasks = state.tasks.map(t => t.id===id ? {...t, weekday: parseInt(val,10)} : t);
    syncField("tasks", state.tasks); render();
  },
  toggleRotationMember(taskId, slotId, email){
    App.mapSlot(taskId, slotId, s => {
      const has = s.rotation.includes(email);
      return {...s, rotation: has ? s.rotation.filter(e=>e!==email) : [...s.rotation, email]};
    });
    render();
  },
  moveRotationMember(taskId, slotId, email, dir){
    App.mapSlot(taskId, slotId, s => {
      const rotation = [...s.rotation];
      const i = rotation.indexOf(email);
      const j = i + dir;
      if (i < 0 || j < 0 || j >= rotation.length) return s;
      [rotation[i], rotation[j]] = [rotation[j], rotation[i]];
      return {...s, rotation};
    });
    render();
  },
  deleteTask(id){ state.tasks = state.tasks.filter(t=>t.id!==id); syncField("tasks", state.tasks); render(); },

  openAddTask(){ state.showAddTask = true; render(); },
  closeAddTask(){ state.showAddTask = false; render(); },
  setNewTask(field, val){ state.newTask[field] = val; render(); },
  addTask(){
    const title = document.getElementById("nt-title").value.trim();
    if (!title) return;
    const checked = Array.from(document.querySelectorAll(".nt-rotcheck:checked")).map(el => el.value);
    const base = checked.length ? checked : state.users.map(u=>u.email);
    const mkSlot = (label, rotation) => ({ id: uid(), label, rotation, override: null,
      status:"pendiente", completedBy:null, completedAt:null, helpRequestedBy:null, points:null, pointsGivenAt:null });
    // Girar la lista `n` posiciones, para que cada slot arranque con una persona distinta.
    const rotated = (arr, n) => arr.length ? arr.map((_,i) => arr[(i+n) % arr.length]) : arr;
    let slots;
    if (state.newTask.slotMode === "2juntas"){
      slots = [ mkSlot("Persona 1", base), mkSlot("Persona 2", rotated(base,1)) ];
    } else if (state.newTask.slotMode === "manana-tarde"){
      slots = [ mkSlot("Mañana", base), mkSlot("Tarde", rotated(base,1)) ];
    } else {
      slots = [ mkSlot(null, base) ];
    }
    const t = {
      id: uid(), title, category: state.newTask.category, recurring: state.newTask.recurring,
      weekday: state.newTask.recurring === "diario" ? null : 0,
      createdAt: Date.now(), slots,
    };
    state.tasks = [t, ...state.tasks]; syncField("tasks", state.tasks);
    pushNotif(`🆕 Nueva tarea: "${t.title}"`, "all");
    state.newTask = { title:"", category:"general", recurring:"diario", assignedTo:"", slotMode:"1" };
    state.showAddTask = false; render();
  },

  openAddAnn(){ state.showAddAnn = true; render(); },
  closeAddAnn(){ state.showAddAnn = false; render(); },
  addAnn(){
    const title = document.getElementById("na-title").value.trim();
    const message = document.getElementById("na-msg").value.trim();
    if (!title) return;
    const a = { id: uid(), title, message, author: state.session.name, authorEmail: state.session.email,
      createdAt: Date.now(), pinned: state.session.role === "master" };
    state.announcements = [a, ...state.announcements]; syncField("announcements", state.announcements);
    pushNotif(`📣 Aviso: "${a.title}"`, "all");
    state.showAddAnn = false; render();
  },
};

  const root = document.getElementById("app");
  if (!firestoreReady){
    root.innerHTML = renderLoading();
    return;
  }
  if (!state.session){
    root.innerHTML = state.screen === "login" ? renderLogin() : renderRegister();
    return;
  }
  root.innerHTML = renderApp();
}

function renderTareas(effTasks, session){
  const cats = Object.entries(CATEGORIES);
  const visible = state.catFilter === "todas" ? effTasks : effTasks.filter(t => t.category === state.catFilter);
  const sorted = visible; // no reordenar: la tarea se queda en su lugar al completarse
  return `
    <div class="filterRow">
      <button class="chip ${state.catFilter==='todas'?'active':''}" style="${state.catFilter==='todas'?'background:#2B3B3A;':''}" onclick="App.setFilter('todas')">Todas</button>
      ${cats.map(([k,c]) => `<button class="chip ${state.catFilter===k?'active':''}" style="${state.catFilter===k?`background:${c.color};border-color:${c.color};`:''}" onclick="App.setFilter('${k}')">${c.label}</button>`).join("")}
    </div>
    ${sorted.length===0 ? `<div class="empty">✨<br>No hay tareas en esta categoría todavía.</div>` : ""}
    <div style="margin-top:8px;">
      ${sorted.map(t => renderTaskCard(t, session)).join("")}
    </div>
    <button class="fab" onclick="App.openAddTask()">＋</button>
  `;
}

function renderTaskCard(t, session){
  const cat = CATEGORIES[t.category] || CATEGORIES.general;
  const isMaster = session.role === "master";
  const allDone = t.slots.every(s => s.effStatus === "completado");
  return `
  <div class="taskCard" style="border-left:5px solid ${cat.color}; opacity:${allDone?0.65:1}; flex-direction:column; align-items:stretch;">
    <div style="display:flex; gap:10px; align-items:flex-start;">
      <div class="taskIconWrap" style="background:${cat.color}22;">${cat.icon}</div>
      <div style="flex:1;min-width:0;">
        <span class="taskTitle" style="text-decoration:${allDone?'line-through':'none'};">${esc(t.title)}</span>
        <div class="taskMeta">${cat.label} · ${t.recurring==='diario'?'diaria':t.recurring==='semanal'?'semanal':'quincenal'}${t.slots.length>1?` · ${t.slots.length} turnos`:''}</div>

    .map(x => ({ user: state.users.find(u => u.email === x.email), weeksAhead: x.weeksAhead }))
    .filter(x => x.user);
  const done = s.effStatus === "completado";
  const helpMode = s.effStatus === "ayuda";

          ${upcoming.map(x => `<span style="font-size:11px; background:#EFE9D8; color:#5A5748; padding:3px 9px; border-radius:999px;">${x.weeksAhead===1?'próxima semana':`en ${x.weeksAhead} semanas`}: ${esc(x.user.name.split(" ")[0])}</span>`).join("")}
        </div>` : ""}
      ${needsPoints ? `
        <div class="sans" style="display:flex; align-items:center; gap:6px; margin-top:6px;">
          <span style="font-size:11px; color:var(--muted);">Dar puntos:</span>
          ${[1,2,3].map(p => `<button class="miniBtn" onclick="App.setPoints('${t.id}','${s.id}',${p})">${p} pt${p>1?'s':''}</button>`).join("")}
        </div>` : ""}

            ${state.users.map(u => `<option value="${u.email}" ${assigneeEmail===u.email && s.override && s.override.weekIndex===weekIndex() ?'selected':''}>${esc(u.name)}</option>`).join("")}
          </select>
          <button class="miniBtn" onclick="App.openRotation('${t.id}','${s.id}')">🔁 editar turnos</button>
        </div>` : ""}
    </div>
    <div class="taskActions">
      <button class="checkBtn ${done?'done':''}" onclick="App.complete('${t.id}','${s.id}')">${done?'✓':'○'}</button>
      ${!done && !helpMode ? `<button class="miniBtn" onclick="App.requestHelp('${t.id}','${s.id}')">🙋 apoyo</button>` : ""}
      ${helpMode && s.helpRequestedBy!==session.email ? `<button class="miniBtn take" onclick="App.takeOver('${t.id}','${s.id}')">tomar</button>` : ""}
    </div>
  </div>`;
}

function renderRotationModal(){
  const t = state.tasks.find(x => x.id === state.rotationEditId);
  if (!t) return "";
  const s = t.slots.find(x => x.id === state.rotationEditSlotId) || t.slots[0];
  const cat = CATEGORIES[t.category] || CATEGORIES.general;
  const inRotUsers = s.rotation.map(email => state.users.find(u=>u.email===email)).filter(Boolean);
  const outRotUsers = state.users.filter(u => !s.rotation.includes(u.email));
  const wi = weekIndex();
  const activeIdx = inRotUsers.length ? wi % inRotUsers.length : -1;
  return `
  <div class="modalOverlay" onclick="if(event.target===this) App.closeRotation()">
    <div class="modalCard">
      <div class="modalHeader"><span class="modalTitle">Turnos: ${esc(t.title)}</span><button class="iconBtn" onclick="App.closeRotation()">✕</button></div>
      ${t.slots.length > 1 ? `
        <div style="display:flex; gap:6px; margin-top:10px;">
          ${t.slots.map(sl => `<button class="chip ${sl.id===s.id?'active':''}" style="${sl.id===s.id?`background:${cat.color};border-color:${cat.color};`:''}" onclick="App.setRotationSlot('${sl.id}')">${sl.label==='Mañana'?'🌅':sl.label==='Tarde'?'🌇':'👤'} ${esc(sl.label||'Turno')}</button>`).join("")}
        </div>` : ""}
      ${t.recurring !== "diario" ? `
        <div class="field" style="margin-top:8px;"><span class="fieldLabel">Día de la semana</span>
          <div class="inputWrap"><select onchange="App.setWeekday('${t.id}', this.value)">
            ${DAY_NAMES.map((d,i) => `<option value="${i}" ${t.weekday===i?'selected':''}>${d}</option>`).join("")}
          </select></div></div>` : ""}

      <div class="fieldLabel" style="margin-top:14px;">Orden de turnos${s.label?` (${esc(s.label)})`:''} — quién sigue después de quién. Se activa un nuevo turno cada semana.</div>
      ${inRotUsers.length===0 ? `<div class="sans" style="font-size:12px; color:var(--muted); margin-top:6px;">Nadie asignado todavía. Agrega participantes abajo.</div>` : ""}
      <div style="display:flex; flex-direction:column; gap:8px; margin-top:10px;">
        ${inRotUsers.map((u,i) => `
          <div class="memberCard" style="margin-bottom:0; ${i===activeIdx?`border:1.5px solid ${cat.color};`:''}">
            <div class="avatar" style="background:${colorFor(u.email)};">${initials(u.name)}</div>
            <div style="flex:1;"><div class="memberName">${esc(u.name)} ${i===activeIdx?' · turno actual':''}</div>
              <div class="memberMeta">Turno #${i+1}${i>0?` · después de ${esc(inRotUsers[i-1].name.split(" ")[0])}`:''}</div></div>
            <div style="display:flex; flex-direction:column; gap:2px;">
              <button class="miniBtn" ${i===0?'disabled style="opacity:.35;"':''} onclick="App.moveRotationMember('${t.id}','${s.id}','${u.email}',-1)">↑</button>
              <button class="miniBtn" ${i===inRotUsers.length-1?'disabled style="opacity:.35;"':''} onclick="App.moveRotationMember('${t.id}','${s.id}','${u.email}',1)">↓</button>
            </div>
            <button class="deleteMini" onclick="App.toggleRotationMember('${t.id}','${s.id}','${u.email}')" title="Quitar de esta tarea">✕</button>
          </div>`).join("")}
      </div>

      <div class="fieldLabel" style="margin-top:18px;">Agregar participantes — no todos hacen todas las tareas.</div>
      <div style="display:flex; flex-direction:column; gap:8px; margin-top:10px;">
        ${outRotUsers.length===0 ? `<div class="sans" style="font-size:12px; color:var(--muted);">Todos los miembros ya participan en esta tarea.</div>` : ""}
        ${outRotUsers.map(u => `
          <label class="memberCard" style="margin-bottom:0; cursor:pointer; opacity:.7;">
            <input type="checkbox" onchange="App.toggleRotationMember('${t.id}','${s.id}','${u.email}')" style="width:18px;height:18px;">
            <div class="avatar" style="background:${colorFor(u.email)};">${initials(u.name)}</div>
            <div style="flex:1;"><div class="memberName">${esc(u.name)}</div>
              <div class="memberMeta">No participa en esta tarea</div></div>
          </label>`).join("")}
      </div>

      <button class="primaryBtn" onclick="App.closeRotation()">Listo</button>
    </div>
  </div>`;
}

function renderCalendario(effTasks){
  const monday = startOfWeek();
  const todayStr = new Date().toDateString();
  const days = Array.from({length:7}, (_,i) => {
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    return { idx: i, date: d, isToday: d.toDateString() === todayStr };
  });
  return `
    <div style="display:flex; flex-direction:column; gap:14px;">
      ${days.map(day => {
        const due = effTasks.filter(t => isTaskDueOn(t, day.idx));
        return `
        <div style="background:${day.isToday?'#FFFDF7':'#fff'}; border:1px solid ${day.isToday?'#D9A441':'#EFE7D2'}; border-radius:12px; padding:12px 14px;">
          <div style="display:flex; align-items:baseline; justify-content:space-between; margin-bottom:${due.length?'8px':'0'};">
            <span style="font-weight:700; font-size:14.5px;">${DAY_NAMES[day.idx]} ${day.isToday?'· hoy':''}</span>
            <span class="sans" style="font-size:11px; color:var(--muted);">${day.date.toLocaleDateString('es-MX',{day:'numeric',month:'short'})}</span>
          </div>
          ${due.length===0 ? `<div class="sans" style="font-size:12px; color:var(--muted);">Sin tareas programadas</div>` : ""}
          ${due.flatMap(t => t.slots.map(s => {
            const cat = CATEGORIES[t.category] || CATEGORIES.general;
            const assigneeEmail = currentAssignee(s);
            const assignedUser = assigneeEmail ? state.users.find(u=>u.email===assigneeEmail) : null;
            const doneToday = day.isToday && s.effStatus === "completado" && s.completedAt && new Date(s.completedAt).toDateString() === todayStr;
            return `<div style="display:flex; align-items:center; gap:8px; padding:6px 0; border-top:1px solid #F1ECDC;">
              <span style="font-size:15px;">${cat.icon}</span>
              <span class="sans" style="flex:1; font-size:13px; text-decoration:${doneToday?'line-through':'none'}; opacity:${doneToday?0.6:1};">${esc(t.title)}${s.label?` <span style="color:var(--muted);">· ${esc(s.label)}</span>`:''}</span>
              ${assignedUser ? `<span class="sans" style="font-size:11px; color:#5A5748; background:#EFE9D8; padding:2px 8px; border-radius:999px;">${esc(assignedUser.name.split(" ")[0])}</span>` : ""}
              ${doneToday ? `<span style="color:var(--sage);">✓</span>` : ""}
            </div>`;
          })).join("")}
        </div>`;
      }).join("")}
    </div>
  `;
}

function renderAvisos(){
  const sorted = [...state.announcements].sort((a,b) => (b.pinned-a.pinned) || (b.createdAt-a.createdAt));
  return `
    ${sorted.length===0 ? `<div class="empty">✨<br>Sin avisos por ahora. Publica el primero.</div>` : ""}
    ${sorted.map(a => `
      <div class="announceCard">
        ${a.pinned ? `<div class="pinTag">📌 fijado</div>` : ""}
        <div class="announceTitle">${esc(a.title)}</div>
        ${a.message ? `<div class="announceMsg">${esc(a.message)}</div>` : ""}
        <div class="announceMeta">${esc(a.author)} · ${timeAgo(a.createdAt)}</div>
      </div>`).join("")}
    <button class="fab" onclick="App.openAddAnn()">📣</button>
  `;
}

function renderNotifs(myUnread){
  const list = [...myUnread].reverse();
  return `
    ${list.length===0 ? `<div class="empty">✨<br>Todavía no hay actividad.</div>` : ""}
    ${list.map(n => `<div class="notifRow"><div class="notifDot"></div>
      <div style="flex:1;"><div class="notifText">${esc(n.message)}</div><div class="notifTime">${timeAgo(n.ts)}</div></div></div>`).join("")}
  `;
}

function renderFamilia(effTasks){
  const now = new Date();
  const monthLabel = now.toLocaleDateString('es-MX', { month: 'long', year: 'numeric' });
  const monthlyPoints = {};
  state.pointsLog.forEach(p => {
    const d = new Date(p.ts);
    if (d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()){
      monthlyPoints[p.email] = (monthlyPoints[p.email] || 0) + p.points;
    }
  });
  const ranked = state.users.map(u => ({ user: u, pts: monthlyPoints[u.email] || 0 }))
    .sort((a,b) => b.pts - a.pts);
  const medals = ["🥇","🥈","🥉"];
  return `
    <div class="fieldLabel" style="margin-bottom:8px;">🏆 Puntos de ${monthLabel}</div>
    ${ranked.map((r,i) => `<div class="memberCard">
      <div class="avatar" style="background:${colorFor(r.user.email)};">${initials(r.user.name)}</div>
      <div style="flex:1;"><div class="memberName">${medals[i]||''} ${esc(r.user.name)} ${r.user.role==='master'?'👑':''}</div>
        <div class="memberMeta">${esc(r.user.email)}</div></div>
      <div class="memberScore">🏆 ${r.pts} pt${r.pts===1?'':'s'}</div>
    </div>`).join("")}

    <div class="fieldLabel" style="margin:18px 0 8px;">✅ Tareas activas completadas</div>
    ${state.users.map(u => {
      const done = effTasks.flatMap(t=>t.slots).filter(s => s.completedBy===u.email && s.effStatus==="completado").length;
      return `<div class="memberCard">
        <div class="avatar" style="background:${colorFor(u.email)};">${initials(u.name)}</div>
        <div style="flex:1;"><div class="memberName">${esc(u.name)} ${u.role==='master'?'👑':''}</div>
          <div class="memberMeta">${esc(u.email)}</div></div>
        <div class="memberScore">⭐ ${done}</div>
      </div>`;
    }).join("")}
  `;
}

function renderAddTaskModal(){
  return `
  <div class="modalOverlay" onclick="if(event.target===this) App.closeAddTask()">
    <div class="modalCard">
      <div class="modalHeader"><span class="modalTitle">Nueva tarea</span><button class="iconBtn" onclick="App.closeAddTask()">✕</button></div>
      <div class="field"><span class="fieldLabel">Título</span>
        <div class="inputWrap"><input id="nt-title" placeholder="Ej. Limpiar la terraza"></div></div>
      <div class="field"><span class="fieldLabel">Categoría</span>
        <div class="inputWrap"><select id="nt-cat" onchange="App.setNewTask('category', this.value)">
          ${Object.entries(CATEGORIES).map(([k,c]) => `<option value="${k}">${c.label}</option>`).join("")}
        </select></div></div>
      <div class="field"><span class="fieldLabel">Frecuencia</span>
        <div class="inputWrap"><select id="nt-rec" onchange="App.setNewTask('recurring', this.value)">
          <option value="diario">Diaria</option><option value="semanal">Semanal</option><option value="quincenal">Quincenal</option>
        </select></div></div>
      <div class="field"><span class="fieldLabel">¿Cómo se reparte esta tarea?</span>
        <div class="inputWrap"><select id="nt-slotmode" onchange="App.setNewTask('slotMode', this.value)">
          <option value="1" ${state.newTask.slotMode==='1'?'selected':''}>Una persona</option>
          <option value="2juntas" ${state.newTask.slotMode==='2juntas'?'selected':''}>Dos personas (mismo horario)</option>
          <option value="manana-tarde" ${state.newTask.slotMode==='manana-tarde'?'selected':''}>Dos personas — mañana y tarde</option>
        </select></div></div>
      <div class="field"><span class="fieldLabel">¿Quiénes rotan esta tarea?</span>
        <div style="display:flex; flex-direction:column; gap:6px; margin-top:4px;">
          ${state.users.map(u => `<label style="display:flex; align-items:center; gap:8px; font-family:-apple-system,system-ui,sans-serif; font-size:13px;">
            <input type="checkbox" class="nt-rotcheck" value="${u.email}" checked style="width:16px;height:16px;"> ${esc(u.name)}</label>`).join("")}
        </div></div>
      <button class="primaryBtn" onclick="App.addTask()">Crear tarea</button>
    </div>
  </div>`;
}
function renderAddAnnModal(){
  return `
  <div class="modalOverlay" onclick="if(event.target===this) App.closeAddAnn()">
    <div class="modalCard">
      <div class="modalHeader"><span class="modalTitle">Nuevo aviso</span><button class="iconBtn" onclick="App.closeAddAnn()">✕</button></div>
      <div class="field"><span class="fieldLabel">Título</span>
        <div class="inputWrap"><input id="na-title" placeholder="Ej. Visita el sábado"></div></div>
      <div class="field"><span class="fieldLabel">Mensaje</span>
        <div class="inputWrap"><textarea id="na-msg" style="min-height:80px;resize:vertical;" placeholder="Detalles del aviso o recordatorio..."></textarea></div></div>
      <button class="primaryBtn" onclick="App.addAnn()">Publicar aviso</button>
    </div>
  </div>`;
}

boot();
</script>
</body>
</html>
